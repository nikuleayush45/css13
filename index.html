
<!DOCTYPE html>
<html>

<head>
    <title>Basic Webpage</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>

        /* Image */
        .img{
            width: 200px;
            height: 200px;
        }

        /* Text Font */
        .text{
            font-family: "Roboto Condensed", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }

        /* Header */
        header{
            background-color: green;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Content section */
        .content{
            text-align: center;
            margin-top: 30px;
        }

        /* Box design */
        .box{
            display: inline-block;
            background: white;
            width: 200px;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        /* Hover effect */
        .box:hover{
            color: black;
            background: pink;
        }

        /* Footer */
        footer{
            text-align: center;
            background: plum;
            color: white;
            padding: 10px;
            margin-top: 40px;
        }

    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1 class="text">Welcome to My Webpage</h1>
        <p>Learning HTML and CSS</p>
    </header>

    <!-- Content -->
    <section class="content">

        <!-- Main Image -->
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPJmSUpNAAAv3-2wsHf8mc9UaoyQVp6fA71g&s" alt="sunlit-golden-sunflower-stockcake" class="img"/>

        <!-- Box 1 -->
        <div class="box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLe1D8nqawgI2qT1jof6Y6a3Qu6BrnZc2MuP1-7a8auao2jKQAG3RHmLRkNZcL3T9SSVXss_NYHuD6UODhFbiEy7veHVCt0bmw0vbHl_sB&s=10"
                 width="80">

            <h3>Web Design</h3>

            <p>This section talks about web design basics.</p>
        </div>

        <!-- Box 2 -->
        <div class="box">

            <img src="https://cdn-icons-png.flaticon.com/512/2721/2721297.png"
                 width="80">

            <h3>Development</h3>

            <p>Learn how to build websites using HTML and CSS.</p>
        </div>

        <!-- Box 3 -->
        <div class="box">

            <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png"
                 width="80">

            <h3>Practice</h3>

            <p>Practice daily to become a good developer.</p>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>

</html>
